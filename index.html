<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EcoSolapur</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- NAV -->
<nav>
  <h2>EcoSolapur</h2>

  <div class="nav-right">
    <button onclick="setLanguage('en')">EN</button>
    <button onclick="setLanguage('mr')">मराठी</button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1 data-key="hero_title"></h1>
  <p data-key="hero_sub"></p>

  <button onclick="scrollToSection('problem')" data-key="btn_start"></button>
</section>

<!-- WHAT IS E-WASTE -->
<section class="card">
  <h2 data-key="what_title"></h2>
  <p data-key="what_desc"></p>
</section>

<!-- HOW GENERATED -->
<section class="card">
  <h2 data-key="gen_title"></h2>
  <p data-key="gen_desc"></p>
</section>

<!-- IMPACT STATS -->
<section class="stats">
  <div class="stat">
    <h3>62M+</h3>
    <p data-key="stat1"></p>
  </div>
  <div class="stat">
    <h3>₹5000Cr+</h3>
    <p data-key="stat2"></p>
  </div>
  <div class="stat">
    <h3>12+</h3>
    <p data-key="stat3"></p>
  </div>
</section>

<!-- PROBLEM -->
<section id="problem" class="card">
  <h2 data-key="problem_title"></h2>
  <p data-key="problem_desc"></p>
</section>

<!-- CTA -->
<section class="cta">
  <h2 data-key="cta_title"></h2>
  <button onclick="bookPickup()" data-key="cta_btn"></button>
</section>

<script src="lang.js"></script>
<script src="script.js"></script>

</body>
</html>
